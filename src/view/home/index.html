<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous" />
</head>

<body style="background-color: #171717;">
  <div class="d-grid gap-4">

    <div class="card"
      style="width: 18rem; display: flex; width: 30%; margin: auto; bottom: 10; background-color: #222327;">
      <div class="card-body">
        <h5 style="color: #27b4a4;" class="card-title">System info</h5>
        <div class="container">
          <div class="d-flex justify-content-end">
            <div style="color: white;" class="col-xs-8">
              <label id="#temp-text" style="font-size: 21px;" class="sr-only">29°C</label>
            </div>
          </div>
          <div class="row">
            <div style="color: #27b4a4;" class="col-xs-3">CPU</div>
            <div class="col-xs-8">
              <div class="progress">
                <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                  id="#cpu-progress-bar" style="background-color: #27b4a4;width: 0%">
                  <span id="#cpu-progress-text" class="sr-only">0% </span>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div style="color: #27b4a4;" class="col-xs-3">RAM 1gb</div>
            <div class="col-xs-8">
              <div class="progress">
                <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                  id="#ram-progress-bar" style="background-color: #8715f8;width: 0%">
                  <span id="#ram-progress-text" class="sr-only">0%</span>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div style="color: #27b4a4;" class="col-xd-3">
              <div class="col-xs-3">STORAGE 16gb</div>
              <div class="col-xs-8">
                <div class="progress">
                  <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                    id="#storage-progress-bar" style="width: 0%">
                    <span id="#storage-progress-text" class="sr-only"> 0% </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container text-center ">
      <div class="row">
      
        <div class="col">
          <a style="text-decoration:none" href="/images" class="custom-card">
          <div class="card" style="width: 15rem; height: 15rem;background-color: #222327;">
            <div  class="card-body">
              <h5 style="color: #27b4a4;" class="card-title">Images</h5>
              <svg style="color: #27b4a4;" xmlns="http://www.w3.org/2000/svg" width="70%" height="70%" f
                fill="currentColor" class="bi bi-card-image" viewBox="0 0 16 16">
                <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
                <path
                  d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12v.54A.505.505 0 0 1 1 12.5v-9a.5.5 0 0 1 .5-.5h13z" />
              </svg>

            </div>
          </a>
          </div>
        </div>
        <div class="col">
          <div class="card" style="width: 15rem; height: 15rem;background-color: #222327;">
            <div class="card-body">

              <h5 style="color: #27b4a4;" class="card-title">Videos</h5>

              <svg style="color: #27b4a4;" xmlns="http://www.w3.org/2000/svg" width="70%" height="70%"
                fill="currentColor" class="bi bi-collection-play" viewBox="0 0 16 16">
                <path
                  d="M2 3a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 0-1h-11A.5.5 0 0 0 2 3zm2-2a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 0-1h-7A.5.5 0 0 0 4 1zm2.765 5.576A.5.5 0 0 0 6 7v5a.5.5 0 0 0 .765.424l4-2.5a.5.5 0 0 0 0-.848l-4-2.5z" />
                <path
                  d="M1.5 14.5A1.5 1.5 0 0 1 0 13V6a1.5 1.5 0 0 1 1.5-1.5h13A1.5 1.5 0 0 1 16 6v7a1.5 1.5 0 0 1-1.5 1.5h-13zm13-1a.5.5 0 0 0 .5-.5V6a.5.5 0 0 0-.5-.5h-13A.5.5 0 0 0 1 6v7a.5.5 0 0 0 .5.5h13z" />
              </svg>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card" style="width: 15rem; height: 15rem; background-color: #222327;">
            <div class="card-body">
              <h5 style="color: #27b4a4;" class="card-title">Files</h5>
              <svg style="color: #27b4a4;" xmlns="http://www.w3.org/2000/svg" width="70%" height="70%"
                fill="currentColor" class="bi bi-files" viewBox="0 0 16 16">
                <path
                  d="M13 0H6a2 2 0 0 0-2 2 2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2 2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm0 13V4a2 2 0 0 0-2-2H5a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1zM3 4a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4z" />
              </svg>


            </div>
          </div>
        </div>
        <div class="col">
          <div class="card" style="width: 15rem; height: 15rem;background-color: #222327;">
            <div class="card-body">
              <h5 style="color: #27b4a4;" class="card-title">Passwords</h5>
              <svg style="color: #27b4a4;" xmlns="http://www.w3.org/2000/svg" width="70%" height="70%"
                fill="currentColor" class="bi bi-key" viewBox="0 0 16 16">
                <path
                  d="M0 8a4 4 0 0 1 7.465-2H14a.5.5 0 0 1 .354.146l1.5 1.5a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0L13 9.207l-.646.647a.5.5 0 0 1-.708 0L11 9.207l-.646.647a.5.5 0 0 1-.708 0L9 9.207l-.646.647A.5.5 0 0 1 8 10h-.535A4 4 0 0 1 0 8zm4-3a3 3 0 1 0 2.712 4.285A.5.5 0 0 1 7.163 9h.63l.853-.854a.5.5 0 0 1 .708 0l.646.647.646-.647a.5.5 0 0 1 .708 0l.646.647.646-.647a.5.5 0 0 1 .708 0l.646.647.793-.793-1-1h-6.63a.5.5 0 0 1-.451-.285A3 3 0 0 0 4 5z" />
                <path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0z" />
              </svg>

            </div>
          </div>
        </div>
        <div class="col">
          <div class="card" style="width: 15rem; height: 15rem;background-color: #222327;">
            <div class="card-body">
              <h5 style="color: #27b4a4;" class="card-title">Terminal</h5>
              <svg style="color: #27b4a4;" xmlns="http://www.w3.org/2000/svg" width="70%" height="70%"
                fill="currentColor" class="bi bi-terminal" viewBox="0 0 16 16">
                <path
                  d="M6 9a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3A.5.5 0 0 1 6 9zM3.854 4.146a.5.5 0 1 0-.708.708L4.793 6.5 3.146 8.146a.5.5 0 1 0 .708.708l2-2a.5.5 0 0 0 0-.708l-2-2z" />
                <path
                  d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm12 1a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h12z" />
              </svg>

            </div>
          </div>
        </div>
      </div>

    </div>
    <script type="text/javascript">
      run();
      
      function run() {
       // update every 1s
       updateSystemInfo();
      }

      async function updateSystemInfo() {
        let response = await fetch("api/systeminfo");
        const systemInfo = await response.json();

        const ram = (systemInfo.system.memTotal - systemInfo.system.memFree) / systemInfo.system.memTotal * 100;
        const storage = systemInfo.storage.used / (systemInfo.storage.used + systemInfo.storage.avaliable) * 100;
        const cpu = systemInfo.system.cpu; // cpu usage
        const temp = systemInfo.system.temp; // cpu temperature in Celcius

        // progress bar
        document.getElementById("#cpu-progress-bar").style.width = `${cpu}%`;
        document.getElementById("#ram-progress-bar").style.width = `${ram}%`;
        document.getElementById("#storage-progress-bar").style.width = `${Math.round(storage)}%`;
        // labels
        document.getElementById("#temp-text").textContent = `${Math.round(temp)}%`;
        document.getElementById("#cpu-progress-text").textContent = `${Math.round(cpu)}%`;
        document.getElementById("#ram-progress-text").textContent = `${Math.round(ram)}%`;
        document.getElementById("#storage-progress-text").textContent = `${Math.round(storage)}%`;

       setInterval(updateSystemInfo, 1000);
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
      crossorigin="anonymous"></script>

</body>

</html>
